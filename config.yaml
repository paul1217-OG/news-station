# 新聞來源設定 — 各地區 RSS Feed
# 已驗證 2026/04 可用，若失效請更新

sources:
  # ==== 台灣股市與產業 ====
  - name: "鉅亨網 台股"
    url: "https://www.cnyes.com/rss/cat/tw_stock"
    category: "TW"
    weight: 1.0

  - name: "TechNews 科技新報"
    url: "https://technews.tw/feed/"
