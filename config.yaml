  # ==== 公開資訊觀測站（手動處理）====
  # MOPS 沒有完整 RSS，靠 OpenAPI 抓取，邏輯寫在 mops_fetcher.py
  # https://openapi.twse.com.tw/v1/opendata/t187ap04_L

# 排序權重（影響 AI 摘要時優先序）
category_priority:
  TW: 1.0
  US: 0.9
  INDUSTRY: 0.85
  ASIA: 0.6
  EU: 0.4
  MACRO: 0.7

# AI 摘要設定
summarizer:
  max_items: 8
  language: "zh-TW"
  tone: "專業、簡潔、客觀，類似華爾街日報中文版風格"

# 圖文卡片設定
card:
  width: 1080
  height: 1350
  brand_name: "📰 每日財經早報"
  primary_color: "#1A237E"
  accent_color: "#FFC107"
  font_path_zh: "/usr/share/fonts/truetype/noto/NotoSansCJK-Bold.ttc"
