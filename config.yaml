# 排序權重（影響挑選優先級）
category_priority:
  MOPS: 1.0       # 公發站最優先（重大訊息直接影響台股個股）
  TW: 1.0         # 台股 + 金融
  INDUSTRY: 0.95  # 含半導體 + 餐飲
  US: 0.85
  ASIA: 0.6
  MACRO: 0.7
  EU: 0.4

# 主題權重（在 .env 中可覆寫）
default_topic_weights:
  TW: 35
  US: 20
  ASIA: 8
  EU: 4
  INDUSTRY: 23   # 半導體 + 餐飲合計
  MACRO: 5
  MOPS: 5

# AI 摘要設定
summarizer:
  max_items: 8
  language: "zh-TW"

# 公發站關鍵字過濾（只挑重要的重大訊息推播）
mops_keywords:
  # 金融
  - "增資"
  - "減資"
  - "現金股利"
  - "股票股利"
  - "盈餘分配"
  - "董事會"
  # 重大投資
  - "投資"
  - "併購"
  - "收購"
  - "處分"
  - "出售"
  - "讓與"
  # 財報
  - "財報"
  - "EPS"
  - "營收"
  - "獲利"
  - "虧損"
  # 半導體 / 餐飲
  - "半導體"
  - "晶圓"
  - "封測"
  - "餐飲"
  - "連鎖"
  # 公司治理
  - "重大訊息"
  - "更正"
  - "停牌"
  - "暫停交易"

# 圖文卡片設定
card:
  width: 1080
  height: 1350
  brand_name: "📰 每日財經早報"
  primary_color: "#0F1932"
  accent_color: "#F5C038"
